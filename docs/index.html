<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLogistic S.A. | Accessibilitat i Sostenibilitat</title>
    <style>
        :root {
            --primary: #0a4d92;
            --secondary: #1e8449; /* Millorat per a contrast 4.5:1 */
            --dark: #1d1d1b;
            --light: #f8f9fa;
            --white: #ffffff;
            --border: #e1e4e8;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        /* CRITERI 3: VISIBILITAT DEL FOCUS PER A NAVEGACIÓ PER TECLAT */
        :focus {
            outline: 3px solid var(--secondary);
            outline-offset: 4px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            line-height: 1.6; 
            color: var(--dark); 
            background: var(--white);
        }

        /* HEADER ACCESSIBLE */
        header { 
            background: var(--white); 
            box-shadow: var(--shadow); 
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 1000; 
        }
        nav { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            padding: 1rem 2rem; 
            align-items: center; 
        }
        .logo { font-weight: 800; font-size: 1.6rem; color: var(--primary); text-decoration: none; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 700; }
        .nav-links a:hover { color: var(--primary); text-decoration: underline; }

        /* HERO SECTION - Sostenibilitat: Contrast alt */
        .hero { 
            height: 60vh; 
            background: linear-gradient(rgba(0, 32, 63, 0.8), rgba(0, 32, 63, 0.8)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=1200') center/cover; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--white); 
            text-align: center; 
            padding: 0 2rem;
            margin-top: 60px;
        }
        .hero-content { max-width: 800px; }
        .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 1rem; }
        .hero p { font-size: 1.2rem; }

        /* SECCIONS */
        section { max-width: 1200px; margin: 4rem auto; padding: 0 2rem; }
        .section-title { color: var(--primary); margin-bottom: 2rem; font-size: 2.2rem; text-align: center; }
        .section-title span { color: var(--secondary); }

        /* CONTACTE GRID */
        .contact-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }
        .contact-form-card { background: var(--light); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 700; color: var(--primary); }
        .form-group input, .form-group textarea { 
            width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem;
        }

        .btn-submit { 
            background: var(--primary); color: var(--white); border: none; 
            padding: 1rem 2rem; border-radius: 6px; cursor: pointer; 
            font-size: 1.1rem; font-weight: 800; width: 100%; transition: var(--transition);
        }
        .btn-submit:hover { background: var(--dark); }

        /* INFO I MAPA */
        .info-card { margin-bottom: 1.5rem; padding: 1rem; border-left: 4px solid var(--secondary); background: var(--light); }
        .map-container { border-radius: 12px; overflow: hidden; height: 250px; margin-top: 1rem; border: 1px solid var(--border); }

        footer { background: var(--dark); color: var(--white); padding: 3rem 2rem; text-align: center; }
        .footer-links span { margin: 0 10px; cursor: pointer; text-decoration: underline; font-size: 0.9rem; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; }
        .modal-content { background: white; max-width: 600px; margin: 10% auto; padding: 2rem; border-radius: 8px; position: relative; color: var(--dark); }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#" class="logo" aria-label="Anar a l'inici de FoodLogistic">FoodLogistic.</a>
            <ul class="nav-links">
                <li><a href="#inici">Inici</a></li>
                <li><a href="#contacte">Contacte</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero" id="inici">
            <div class="hero-content">
                <h1>Connectem la frescor amb el teu negoci</h1>
                <p>Distribució líder a Mataró amb tecnologia logística d'última generació.</p>
            </div>
        </section>

        <section id="contacte">
            <h2 class="section-title">Parlem del teu <span>projecte</span></h2>
            <div class="contact-wrapper">
                
                <div class="contact-form-card">
                    <form id="contactForm">
                        <div class="form-group">
                            <label for="nom">Nom Complet</label>
                            <input type="text" id="nom" name="nom" required aria-required="true">
                        </div>
                        <div class="form-group">
                            <label for="email">E-mail Corporatiu</label>
                            <input type="email" id="email" name="email" required aria-required="true">
                        </div>
                        <div class="form-group">
                            <label for="missatge">Missatge</label>
                            <textarea id="missatge" name="missatge" rows="4" required aria-required="true"></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Enviar Sol·licitud</button>
                    </form>
                </div>

                <div class="company-info">
                    <div class="info-card">
                        <h3>📍 Ubicació</h3>
                        <p>Carrer de Sant Agustí, 59, Mataró</p>
                    </div>
                    <!-- CRITERI 2: ALTERNATIVA TEXTUAL PER A IFRAMES -->
                    <div class="map-container">
                        <iframe 
                            title="Mapa de Google amb la ubicació de FoodLogistic a Mataró"
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2985.6415!2d2.4439!3d41.5317!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x12a4b51939634d0b%3A0xc3f8e65893a207f2!2sCarrer%20de%20Sant%20Agust%C3%AD%2C%2059%2C%2008301%20Matar%C3%B3!5e0!3m2!1sca!2ses!4v1640000000000" 
                            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                        </iframe>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 FoodLogistic S.A.</p>
        <div class="footer-links">
            <span onclick="alert('Avís Legal')" role="button" tabindex="0">Avís Legal</span>
            <span onclick="alert('Privacitat')" role="button" tabindex="0">Privacitat</span>
        </div>
    </footer>
